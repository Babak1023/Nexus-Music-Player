<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Music Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #3a0ca3;
            --dark: #0a1128;
            --light: #f8f9fa;
            --accent: #f72585;
            --header-bg: rgba(10, 17, 40, 0.9);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --success: #4cc9f0;
            --warning: #f8961e;
            --danger: #ef233c;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: linear-gradient(135deg, var(--dark), #000);
            color: var(--light);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Loading Screen */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--dark);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1s ease-out;
        }

        .loading-screen.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .loading-animation {
            position: relative;
            width: 150px;
            height: 150px;
            margin-bottom: 30px;
        }

        .loading-disc {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(
                var(--primary) 0% 10%,
                var(--secondary) 10% 20%,
                var(--accent) 20% 30%,
                var(--primary) 30% 40%,
                var(--secondary) 40% 50%,
                var(--accent) 50% 60%,
                var(--primary) 60% 70%,
                var(--secondary) 70% 80%,
                var(--accent) 80% 90%,
                var(--primary) 90% 100%
            );
            animation: spin 2s linear infinite;
            box-shadow: 0 0 30px rgba(67, 97, 238, 0.5);
        }

        .loading-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 30px;
            background: var(--dark);
            border-radius: 50%;
            border: 3px solid var(--light);
        }

        .loading-text {
            color: var(--light);
            font-size: 18px;
            font-weight: 500;
            text-align: center;
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .loading-dots {
            display: inline-flex;
            margin-top: 10px;
        }

        .loading-dot {
            width: 10px;
            height: 10px;
            background: var(--accent);
            border-radius: 50%;
            margin: 0 5px;
            animation: bounce 1.5s infinite ease-in-out;
        }

        .loading-dot:nth-child(1) { animation-delay: 0s; }
        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Floating particles background */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        /* Floating music notes */
        .music-note {
            position: absolute;
            font-size: 1.5rem;
            opacity: 0;
            animation: floatNote 6s linear infinite;
            z-index: -1;
            text-shadow: 0 0 10px currentColor;
        }

        @keyframes floatNote {
            0% { transform: translateY(0) rotate(0deg) scale(0.5); opacity: 0; left: 10%; }
            10% { opacity: 1; transform: scale(1); }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(360deg) scale(0.5); opacity: 0; left: 90%; }
        }

        /* Audio visualization */
        .audio-visualizer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 3px;
            padding: 10px;
            z-index: -1;
            opacity: 0.3;
        }

        .visualizer-bar {
            width: 4px;
            background: linear-gradient(to top, var(--primary), var(--accent));
            border-radius: 2px;
            animation: equalize 1.5s infinite ease-in-out;
            transform-origin: bottom;
        }

        @keyframes equalize {
            0%, 100% { transform: scaleY(0.2); }
            50% { transform: scaleY(1); }
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 15px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            animation: fadeIn 0.8s ease-out;
        }
        
        header {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--glass-border);
            background: var(--header-bg);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            animation: slideDown 0.5s ease-out;
        }
        
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            padding: 0 10px;
        }
        
        .logo {
            font-size: clamp(18px, 5vw, 24px);
            font-weight: 700;
            color: white;
            white-space: nowrap;
            text-shadow: 0 0 8px rgba(255,255,255,0.5);
            letter-spacing: 1px;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textGlow 3s infinite alternate;
        }

        @keyframes textGlow {
            0% { text-shadow: 0 0 10px rgba(67, 97, 238, 0.5); }
            100% { text-shadow: 0 0 20px rgba(247, 37, 133, 0.7); }
        }
        
        .search-box {
            display: flex;
            width: 100%;
            max-width: 500px;
            min-width: 150px;
            flex-grow: 1;
            animation: fadeInRight 0.8s ease-out;
        }
        
        .search-box input {
            flex: 1;
            padding: 10px 15px;
            border: none;
            border-radius: 20px 0 0 20px;
            background: var(--glass-bg);
            color: white;
            font-size: clamp(12px, 3vw, 14px);
            outline: none;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            border: 1px solid var(--glass-border);
        }

        .search-box input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(247, 37, 133, 0.3);
        }
        
        .search-box button {
            padding: 10px 20px;
            border: none;
            border-radius: 0 20px 20px 0;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: clamp(12px, 3vw, 14px);
            white-space: nowrap;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .search-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(58, 12, 163, 0.4);
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            min-height: calc(100vh - 150px);
        }
        
        @media (min-width: 768px) {
            .main-content {
                grid-template-columns: minmax(250px, 300px) 1fr;
            }
        }
        
        @media (min-width: 992px) {
            .main-content {
                grid-template-columns: minmax(300px, 350px) 1fr;
            }
        }
        
        .now-playing {
            background: var(--glass-bg);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            order: 2;
            border: 1px solid var(--glass-border);
            transition: all 0.4s ease;
            animation: fadeInUp 0.8s 0.2s both;
        }

        .now-playing:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }
        
        @media (min-width: 768px) {
            .now-playing {
                order: 1;
            }
        }
        
        .song-cover-container {
            position: relative;
            width: 100%;
            max-width: 300px;
            margin: 0 auto 15px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            animation: scaleIn 0.8s 0.4s both;
        }

        @keyframes scaleIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        
        .song-cover {
            width: 100%;
            border-radius: 8px;
            aspect-ratio: 1/1;
            object-fit: cover;
            transition: transform 0.5s ease;
            animation: floatDisc 4s ease-in-out infinite;
        }

        .song-cover-container:hover .song-cover {
            transform: scale(1.05);
        }
        
        .playlist-title-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            padding: 15px;
            border-bottom-left-radius: 8px;
            border-bottom-right-radius: 8px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }

        .song-cover-container:hover .playlist-title-overlay {
            transform: translateY(0);
        }
        
        .playlist-title-overlay h2 {
            font-size: clamp(14px, 3vw, 16px);
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            animation: fadeIn 0.5s 0.6s both;
        }
        
        .playlist-title-overlay p {
            font-size: clamp(12px, 2vw, 14px);
            color: var(--secondary);
            animation: fadeIn 0.5s 0.7s both;
        }
        
        .song-info {
            margin-bottom: 15px;
            text-align: center;
            animation: fadeIn 0.8s 0.5s both;
        }
        
        .song-info h2 {
            font-size: clamp(16px, 4vw, 20px);
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .song-info p {
            color: var(--secondary);
            margin-bottom: 10px;
            font-size: clamp(12px, 3vw, 14px);
        }
        
        .progress-container {
            margin-bottom: 15px;
            animation: fadeIn 0.8s 0.6s both;
        }
        
        .progress-bar {
            height: 6px;
            width: 100%;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            margin-bottom: 5px;
            overflow: hidden;
            cursor: pointer;
            transition: height 0.2s ease;
        }

        .progress-bar:hover {
            height: 8px;
        }
        
        .progress {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, var(--primary), var(--accent));
            border-radius: 3px;
            transition: width 0.1s linear;
            position: relative;
            overflow: hidden;
        }

        .progress::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: progressShine 2s infinite;
        }

        @keyframes progressShine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        
        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: rgba(255,255,255,0.6);
        }
        
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            flex-wrap: wrap;
            gap: 10px;
            animation: fadeIn 0.8s 0.7s both;
        }
        
        .control-btn {
            background: none;
            border: none;
            color: white;
            font-size: clamp(16px, 4vw, 20px);
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            flex-shrink: 0;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .control-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            transform: scale(0);
            transition: transform 0.3s ease;
        }

        .control-btn:hover::before {
            transform: scale(1);
        }

        .control-btn:hover {
            transform: translateY(-3px);
            text-shadow: 0 5px 10px rgba(255,255,255,0.3);
        }
        
        .play-btn {
            background: linear-gradient(to right, var(--primary), var(--accent));
            width: 50px;
            height: 50px;
            font-size: 22px;
            box-shadow: 0 5px 15px rgba(67, 97, 238, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .play-btn:hover {
            box-shadow: 0 8px 20px rgba(247, 37, 133, 0.5);
        }
        
        .playlist-container {
            background: var(--glass-bg);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            height: 400px;
            order: 1;
            border: 1px solid var(--glass-border);
            transition: all 0.4s ease;
            animation: fadeInUp 0.8s 0.3s both;
        }

        .playlist-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }
        
        @media (min-width: 768px) {
            .playlist-container {
                height: auto;
                order: 2;
            }
        }
        
        .playlist-header {
            padding: 15px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .playlist-header h2 {
            font-size: clamp(16px, 4vw, 18px);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .playlist-filters {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 10px 15px;
            border-bottom: 1px solid var(--glass-border);
            scrollbar-width: none;
        }
        
        .playlist-filters::-webkit-scrollbar {
            display: none;
        }
        
        .filter-btn {
            padding: 6px 12px;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
            border: none;
            transition: all 0.3s ease;
        }

        .filter-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }
        
        .filter-btn.active {
            background: linear-gradient(to right, var(--primary), var(--accent));
            box-shadow: 0 3px 10px rgba(67, 97, 238, 0.3);
        }
        
        .song-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            -webkit-overflow-scrolling: touch;
        }
        
        .song-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 15px;
            border-radius: 10px;
            background: rgba(255,255,255,0.03);
            cursor: pointer;
            margin: 5px 0;
            position: relative;
            transition: all 0.3s ease;
            animation: fadeIn 0.5s both;
            animation-delay: calc(var(--i) * 0.05s);
        }

        .song-item:hover {
            background: rgba(255,255,255,0.08);
            transform: translateX(5px);
        }
        
        .song-item.active {
            background: linear-gradient(to right, rgba(67, 97, 238, 0.2), rgba(247, 37, 133, 0.2));
            border-left: 3px solid var(--accent);
            box-shadow: 0 5px 15px rgba(67, 97, 238, 0.2);
        }
        
        .song-item img {
            width: 40px;
            height: 40px;
            border-radius: 6px;
            object-fit: cover;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }

        .song-item:hover img {
            transform: scale(1.1);
        }
        
        .song-details {
            flex: 1;
            min-width: 0;
        }
        
        .song-details h3 {
            font-size: clamp(12px, 3vw, 14px);
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #fff;
            font-weight: 500;
            text-shadow: 0 1px 3px rgba(0,0,0,0.7);
        }
        
        .song-details p {
            font-size: 12px;
            color: var(--secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            opacity: 0.9;
            font-weight: 400;
        }
        
        .song-duration {
            font-size: 12px;
            color: rgba(255,255,255,0.9);
            flex-shrink: 0;
            font-weight: 500;
        }
        
        /* Hidden YouTube player */
        #youtube-player {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }
        
        /* Volume control */
        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
            width: 100%;
            animation: fadeIn 0.8s 0.8s both;
        }
        
        .volume-control input {
            flex: 1;
            -webkit-appearance: none;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            outline: none;
            transition: all 0.3s ease;
        }

        .volume-control input:hover {
            height: 6px;
        }
        
        .volume-control input::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .volume-control input::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 0 5px rgba(255,255,255,0.5);
        }
        
        /* Queue button */
        .queue-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
            opacity: 0;
        }

        .song-item:hover .queue-btn {
            opacity: 1;
        }

        .queue-btn:hover {
            background: var(--accent);
            transform: translateY(-50%) scale(1.1);
        }
        
        /* Queue indicator */
        .queue-indicator {
            position: fixed;
            top: 15px;
            left: 15px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 1000;
            backdrop-filter: blur(5px);
            border: 1px solid var(--glass-border);
            cursor: pointer;
            transition: all 0.3s ease;
            animation: bounceIn 0.5s;
        }

        .queue-indicator:hover {
            background: rgba(0,0,0,0.8);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .queue-count {
            background: var(--accent);
            color: white;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .queue-indicator:hover .queue-count {
            transform: scale(1.1);
        }
        
        /* Lyrics container */
        .lyrics-container {
            background: var(--glass-bg);
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
            border: 1px solid var(--glass-border);
            animation: fadeIn 0.5s;
        }
        
        .lyrics-title {
            font-size: 14px;
            margin-bottom: 12px;
            color: var(--secondary);
            text-align: center;
            font-weight: 600;
        }
        
        .lyrics-content {
            text-align: center;
            line-height: 1.8;
            font-size: 14px;
            color: rgba(255,255,255,0.8);
        }

        .lyrics-line {
            transition: all 0.3s ease;
            margin: 5px 0;
            opacity: 0.7;
        }

        .lyrics-line.active {
            color: var(--accent);
            font-weight: 600;
            transform: scale(1.05);
            opacity: 1;
            text-shadow: 0 0 10px rgba(247, 37, 133, 0.3);
        }
        
        /* About button */
        .about-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(to right, var(--primary), var(--accent));
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            text-decoration: none;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            box-shadow: 0 5px 20px rgba(67, 97, 238, 0.4);
            transition: all 0.3s ease;
            animation: pulse 2s infinite, bounceIn 0.8s;
        }

        .about-button:hover {
            transform: scale(1.1) rotate(15deg);
            box-shadow: 0 8px 25px rgba(247, 37, 133, 0.5);
        }
        
        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 3px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(var(--primary), var(--accent));
            border-radius: 3px;
            transition: all 0.3s ease;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }
        
        /* Loading indicator */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 20px;
            color: rgba(255,255,255,0.8);
            font-size: 16px;
            animation: fadeIn 0.5s;
        }

        /* Error state */
        .error-state {
            text-align: center;
            padding: 20px;
            color: var(--accent);
            font-size: 16px;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        /* Error animation */
        .error-animation {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            position: relative;
        }

        .error-face {
            width: 100%;
            height: 100%;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            animation: errorPulse 2s infinite;
        }

        @keyframes errorPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .error-eyes {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: -15px;
        }

        .error-eye {
            width: 15px;
            height: 15px;
            background: white;
            border-radius: 50%;
            position: relative;
        }

        .error-eye::after {
            content: '';
            position: absolute;
            top: 5px;
            left: 5px;
            width: 5px;
            height: 5px;
            background: var(--dark);
            border-radius: 50%;
        }

        .error-mouth {
            width: 40px;
            height: 15px;
            border-bottom: 3px solid white;
            border-radius: 0 0 20px 20px;
            margin-top: 15px;
            animation: mouthMove 3s infinite;
        }

        @keyframes mouthMove {
            0%, 100% { 
                width: 40px;
                height: 15px;

                width: 30px;
                height: 20px;
                border-radius: 0 0 15px 15px;
            }
        }

        /* Mobile-only elements */
        .mobile-controls {

        /* Desktop-only elements */

        }

        /* Responsive adjustments */

        // Create floating hearts

            const heartIcons = ['❤️', '🧡', '💛', '💚', '💙', '💜', '🤎', '🖤', '🤍'];

                heart.className = 'heart';

                const size = Math.random() * 1.5 + 0.5;

                heart.style.fontSize = `${size}rem`;

                heart.style.bottom = '0';

        // Load trending songs
        async function loadTrendingSongs() {
            try {
                songList.innerHTML = '<div class="empty-state">Loading songs...</div>';
                
                // Load multiple years of trending songs (200 tracks)
                const years = ['2025', '2024', '2023'];
                let allSongs = [];
                
                for (const year of years) {
                    // Make multiple requests to get more songs
                    for (let i = 0; i < 4; i++) {
                        const response = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=top+songs+${year}&type=video&videoCategoryId=10&maxResults=50&key=${YT_API_KEY}`);
                        const data = await response.json();
                        
                        if (data.items && data.items.length > 0) {
                            const yearSongs = data.items.map(item => ({
                                id: item.id.videoId,
                                title: cleanSongTitle(item.snippet.title),
                                artist: cleanArtistName(item.snippet.channelTitle),
                                thumbnail: item.snippet.thumbnails.medium ? item.snippet.thumbnails.medium.url : 'https://via.placeholder.com/150',
                                duration: formatDuration(Math.floor(Math.random() * 240) + 120),
                                type: getRandomGenre(),
                                year: year
                            }));
                            
                            allSongs = [...allSongs, ...yearSongs];
                        }
                    }
                }
                
                // Remove duplicates
                songs = allSongs.filter((song, index, self) =>
                    index === self.findIndex((s) => (
                        s.id === song.id
                    ))
                );
                
                // If we didn't get enough songs from API, add fallback
                if (songs.length < 50) {
                    songs = [...songs, ...getFallbackSongs()];
                }
                
                // Limit to 200 songs
                songs = songs.slice(0, 200);
                
                applyFilter();
                
                if (songs.length > 0) {
                    currentSongIndex = 0;
                    updateNowPlaying();
                }
            } catch (error) {
                console.error('Error loading songs:', error);
                showErrorAnimation();
                songs = getFallbackSongs();
                applyFilter();
                
                if (songs.length > 0) {
                    currentSongIndex = 0;
                    updateNowPlaying();
                }
            }
        }

        // Clean song title (remove things like "Official Video")
        function cleanSongTitle(title) {
            return title
                .replace(/\(official video\)/gi, '')
                .replace(/\(official music video\)/gi, '')
                .replace(/\[official video\]/gi, '')
                .replace(/\(lyrics\)/gi, '')
                .replace(/\[lyrics\]/gi, '')
                .replace(/\|.*$/g, '')
                .replace(/-.*$/g, '')
                .trim();
        }
        
        // Clean artist name
        function cleanArtistName(artist) {
            return artist
                .replace(/ - topic/gi, '')
                .replace(/vevo/gi, '')
                .trim();
        }
        
        // Format duration (seconds to MM:SS)
        function formatDuration(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }
        
        // Apply current filter to songs
        function applyFilter() {
            if (currentFilter === 'all') {
                filteredSongs = [...songs];
            } else if (currentFilter.startsWith('year')) {
                const year = currentFilter.replace('year', '');
                filteredSongs = songs.filter(song => song.year === year);
            } else {
                filteredSongs = songs.filter(song => song.type === currentFilter);
            }
            
            renderPlaylist();
        }
        
        // Render playlist
        function renderPlaylist() {
            if (filteredSongs.length === 0) {
                songList.innerHTML = '<div class="empty-state">No songs found</div>';
                return;
            }
            
            songList.innerHTML = '';
            filteredSongs.forEach((song, index) => {
                const songItem = document.createElement('div');
                songItem.className = `song-item ${songs[currentSongIndex]?.id === song.id ? 'active' : ''}`;
                songItem.dataset.index = index;
                songItem.style.setProperty('--i', index);
                
                songItem.innerHTML = `
                    <img src="${song.thumbnail}" alt="${song.title}">
                    <div class="song-details">
                        <h3>${song.title}</h3>
                        <p>${song.artist}</p>
                    </div>
                    <div class="song-duration">${song.duration}</div>
                    ${song.type === 'playlist' ? '<span style="font-size:12px;color:var(--accent);">🎵</span>' : ''}
                    <button class="queue-btn" title="Add to queue">+</button>
                `;
                
                songItem.addEventListener('click', (e) => {
                    if (!e.target.classList.contains('queue-btn')) {
                        currentSongIndex = songs.findIndex(s => s.id === song.id);
                        playCurrentSong();
                    }
                });
                
                const queueBtn = songItem.querySelector('.queue-btn');
                queueBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    addToQueue(song);
                });
                
                songList.appendChild(songItem);
            });
        }
        
        // Add song to queue
        function addToQueue(song) {
            songQueue.push(song);
            updateQueueIndicator();
            
            showNotification(`Added "${song.title}" to queue`);
            
            // Animate queue count
            queueCount.classList.add('animate__animated', 'animate__rubberBand');
            setTimeout(() => {
                queueCount.classList.remove('animate__animated', 'animate__rubberBand');
            }, 1000);
        }
        
        // Show notification
        function showNotification(message) {
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.innerHTML = `
                <span>${message}</span>
            `;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.classList.add('show');
            }, 10);
            
            setTimeout(() => {
                notification.classList.remove('show');
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }
        
        // Update queue indicator
        function updateQueueIndicator() {
            if (songQueue.length > 0) {
                queueIndicator.style.display = 'flex';
                queueCount.textContent = songQueue.length;
            } else {
                queueIndicator.style.display = 'none';
            }
        }
        
        // Play next song from queue if available
        function playNextFromQueue() {
            if (songQueue.length > 0) {
                const nextSong = songQueue.shift();
                currentSongIndex = songs.findIndex(s => s.id === nextSong.id);
                updateQueueIndicator();
                playCurrentSong();
                return true;
            }
            return false;
        }
        
        // YouTube IFrame API callback
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                height: '0',
                width: '0',
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }
        
        function onPlayerReady(event) {
            console.log('YouTube player ready');
            player.setVolume(volumeSlider.value);
            animateVisualizer();
        }
        
        function onPlayerStateChange(event) {
            if (event.data === YT.PlayerState.ENDED) {
                if (!playNextFromQueue()) {
                    playNextSong();
                }
            }
            
            if (event.data === YT.PlayerState.PLAYING) {
                isPlaying = true;
                playBtn.textContent = '⏸';
                mobilePlayBtn.textContent = '⏸';
                miniPlayerPlayBtn.textContent = '⏸';
                startProgressTracking();
                fetchLyrics();
                
                // Animate play button
                playBtn.classList.add('animate__animated', 'animate__pulse');
                setTimeout(() => {
                    playBtn.classList.remove('animate__animated', 'animate__pulse');
                }, 1000);
            } else if (event.data === YT.PlayerState.PAUSED || event.data === YT.PlayerState.ENDED) {
                isPlaying = false;
                playBtn.textContent = '▶';
                mobilePlayBtn.textContent = '▶';
                miniPlayerPlayBtn.textContent = '▶';
                if (progressInterval) clearInterval(progressInterval);
            }
        }
        
        // Fetch lyrics for current song
        async function fetchLyrics() {
            const currentSong = songs[currentSongIndex];
            if (!currentSong) return;
            
            try {
                lyricsContent.innerHTML = '<div class="empty-state">Loading lyrics...</div>';
                lyricsContainer.style.display = 'block';
                
                const response = await fetch(`${LYRICS_API_URL}${currentSong.artist}/${currentSong.title}`);
                const data = await response.json();
                
                if (data.lyrics) {
                    currentLyrics = data.lyrics.split('\n').filter(line => line.trim() !== '');
                    renderLyrics();
                } else {
                    lyricsContent.innerHTML = '<div class="empty-state">Lyrics not available</div>';
                }
            } catch (error) {
                console.error('Error fetching lyrics:', error);
                lyricsContent.innerHTML = '<div class="empty-state">Could not load lyrics</div>';
            }
        }
        
        // Render lyrics
        function renderLyrics() {
            lyricsContent.innerHTML = '';
            currentLyrics.forEach(line => {
                const lineElement = document.createElement('div');
                lineElement.className = 'lyrics-line';
                lineElement.textContent = line;
                lyricsContent.appendChild(lineElement);
            });
        }
        
        // Update now playing info
        function updateNowPlaying() {
            if (songs.length === 0 || currentSongIndex < 0 || currentSongIndex >= songs.length) return;
            
            const currentSong = songs[currentSongIndex];
            songTitle.textContent = currentSong.title;
            songArtist.textContent = currentSong.artist || 'Unknown Artist';
            songCover.src = `https://i.ytimg.com/vi/${currentSong.id}/maxresdefault.jpg`;
            miniPlayerTitle.textContent = currentSong.title;
            miniPlayerArtist.textContent = currentSong.artist || 'Unknown Artist';
            miniPlayerCover.src = `https://i.ytimg.com/vi/${currentSong.id}/hqdefault.jpg`;
            
            songCover.onerror = function() {
                this.src = `https://i.ytimg.com/vi/${currentSong.id}/hqdefault.jpg`;
            };
            
            miniPlayerCover.onerror = function() {
                this.src = 'https://via.placeholder.com/40';
            };
            
            lyricsContainer.style.display = 'none';
            
            // Animate song cover
            songCover.classList.add('animate__animated', 'animate__flipInX');
            setTimeout(() => {
                songCover.classList.remove('animate__animated', 'animate__flipInX');
            }, 1000);
            
            // Animate song title
            songTitle.classList.add('animate__animated', 'animate__fadeIn');
            setTimeout(() => {
                songTitle.classList.remove('animate__animated', 'animate__fadeIn');
            }, 1000);
        }
        
        // Play current song
        function playCurrentSong() {
            if (songs.length === 0 || currentSongIndex < 0 || currentSongIndex >= songs.length) return;
            
            const currentSong = songs[currentSongIndex];
            updateNowPlaying();
            
            document.querySelectorAll('.song-item').forEach((item, index) => {
                if (index === filteredSongs.findIndex(s => s.id === currentSong.id)) {
                    item.classList.add('active');
                    item.classList.add('animate__animated', 'animate__pulse');
                    setTimeout(() => {
                        item.classList.remove('animate__animated', 'animate__pulse');
                    }, 1000);
                } else {
                    item.classList.remove('active');
                }
            });
            
            player.loadVideoById(currentSong.id);
            player.playVideo();
            isPlaying = true;
            playBtn.textContent = '⏸';
            mobilePlayBtn.textContent = '⏸';
            miniPlayerPlayBtn.textContent = '⏸';
        }
        
        // Start tracking playback progress
        function startProgressTracking() {
            if (progressInterval) clearInterval(progressInterval);
            
            progressInterval = setInterval(() => {
                const currentTime = player.getCurrentTime();
                const duration = player.getDuration();
                
                const progressPercent = (currentTime / duration) * 100;
                progressBar.style.width = `${progressPercent}%`;
                
                currentTimeEl.textContent = formatTime(currentTime);
                durationEl.textContent = formatTime(duration);
                
                // Highlight current lyric
                highlightCurrentLyric(currentTime);
                
                // Update mini player visibility based on scroll
                updateMiniPlayerVisibility();
            }, 1000);
        }
        
        // Highlight current lyric
        function highlightCurrentLyric(currentTime) {
            const lyricsLines = document.querySelectorAll('.lyrics-line');
            let currentLine = -1;
            
            // Simple logic to highlight lyrics (would need more sophisticated logic for real sync)
            if (lyricsLines.length > 0) {
                currentLine = Math.floor((currentTime / player.getDuration()) * lyricsLines.length);
                currentLine = Math.min(currentLine, lyricsLines.length - 1);
                
                lyricsLines.forEach((line, index) => {
                    if (index === currentLine) {
                        line.classList.add('active');
                        // Scroll to active line
                        line.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    } else {
                        line.classList.remove('active');
                    }
                });
            }
        }
        
        // Format time (seconds to MM:SS)
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }
        
        // Toggle play/pause
        function togglePlay() {
            if (songs.length === 0) return;
            
            if (isPlaying) {
                player.pauseVideo();
            } else {
                player.playVideo();
            }
        }
        
        // Play next song
        function playNextSong() {
            if (filteredSongs.length === 0) return;
            
            const currentSongId = songs[currentSongIndex]?.id;
            let currentFilteredIndex = filteredSongs.findIndex(s => s.id === currentSongId);
            
            currentFilteredIndex = (currentFilteredIndex + 1) % filteredSongs.length;
            currentSongIndex = songs.findIndex(s => s.id === filteredSongs[currentFilteredIndex].id);
            
            playCurrentSong();
            
            // Animate next button
            nextBtn.classList.add('animate__animated', 'animate__fadeInRight');
            setTimeout(() => {
                nextBtn.classList.remove('animate__animated', 'animate__fadeInRight');
            }, 500);
        }
        
        // Play previous song
        function playPrevSong() {
            if (filteredSongs.length === 0) return;
            
            const currentSongId = songs[currentSongIndex]?.id;
            let currentFilteredIndex = filteredSongs.findIndex(s => s.id === currentSongId);
            
            currentFilteredIndex = (currentFilteredIndex - 1 + filteredSongs.length) % filteredSongs.length;
            currentSongIndex = songs.findIndex(s => s.id === filteredSongs[currentFilteredIndex].id);
            
            playCurrentSong();
            
            // Animate prev button
            prevBtn.classList.add('animate__animated', 'animate__fadeInLeft');
            setTimeout(() => {
                prevBtn.classList.remove('animate__animated', 'animate__fadeInLeft');
            }, 500);
        }
        
        // Rewind 10 seconds
        function rewind() {
            const currentTime = player.getCurrentTime();
            player.seekTo(Math.max(0, currentTime - 10), true);
            
            // Animate rewind button
            rewindBtn.classList.add('animate__animated', 'animate__rotateIn');
            setTimeout(() => {
                rewindBtn.classList.remove('animate__animated', 'animate__rotateIn');
            }, 500);
        }
        
        // Forward 10 seconds
        function forward() {
            const currentTime = player.getCurrentTime();
            const duration = player.getDuration();
            player.seekTo(Math.min(duration, currentTime + 10), true);
            
            // Animate forward button
            forwardBtn.classList.add('animate__animated', 'animate__rotateIn');
            setTimeout(() => {
                forwardBtn.classList.remove('animate__animated', 'animate__rotateIn');
            }, 500);
        }
        
        // Toggle mute
        function toggleMute() {
            if (isMuted) {
                player.unMute();
                player.setVolume(lastVolume);
                volumeSlider.value = lastVolume;
                volumeBtn.textContent = lastVolume > 0 ? '🔊' : '🔇';
            } else {
                lastVolume = player.getVolume();
                player.mute();
                volumeSlider.value = 0;
                volumeBtn.textContent = '🔇';
            }
            isMuted = !isMuted;
            
            // Animate volume button
            volumeBtn.classList.add('animate__animated', 'animate__bounce');
            setTimeout(() => {
                volumeBtn.classList.remove('animate__animated', 'animate__bounce');
            }, 1000);
        }
        
        // Handle volume change
        function setVolume() {
            const volume = volumeSlider.value;
            player.setVolume(volume);
            
            if (volume > 0 && isMuted) {
                player.unMute();
                isMuted = false;
            }
            
            volumeBtn.textContent = volume > 0 ? '🔊' : '🔇';
        }
        
        // Handle progress bar click
        function seekTo(event) {
            if (!player || !player.getDuration) return;
            
            const rect = progressBarContainer.getBoundingClientRect();
            const percent = (event.clientX - rect.left) / rect.width;
            const duration = player.getDuration();
            player.seekTo(duration * percent, true);
            
            // Animate progress bar
            progressBar.classList.add('animate__animated', 'animate__pulse');
            setTimeout(() => {
                progressBar.classList.remove('animate__animated', 'animate__pulse');
            }, 500);
        }
        
        // Search YouTube for songs
        async function searchSongs(query) {
            if (!query.trim()) {
                showNotification('Please enter a search term');
                return;
            }
            
            try {
                songList.innerHTML = '<div class="empty-state">Searching...</div>';
                
                const response = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query)}&type=video&videoCategoryId=10&maxResults=50&key=${YT_API_KEY}`);
                
                if (!response.ok) {
                    throw new Error(`API request failed with status ${response.status}`);
                }
                
                const data = await response.json();
                
                if (!data.items || data.items.length === 0) {
                    songList.innerHTML = '<div class="empty-state">No results found</div>';
                    return;
                }
                
                songs = data.items.map(item => ({
                    id: item.id.videoId,
                    title: cleanSongTitle(item.snippet.title),
                    artist: cleanArtistName(item.snippet.channelTitle),
                    thumbnail: item.snippet.thumbnails.medium ? item.snippet.thumbnails.medium.url : 'https://via.placeholder.com/150',
                    duration: formatDuration(Math.floor(Math.random() * 240) + 120),
                    type: getRandomGenre(),
                    year: '2025'
                }));
                
                applyFilter();
                
                if (songs.length > 0) {
                    currentSongIndex = 0;
                    playCurrentSong();
                }
                
                // Animate search button
                searchBtn.classList.add('animate__animated', 'animate__rubberBand');
                setTimeout(() => {
                    searchBtn.classList.remove('animate__animated', 'animate__rubberBand');
                }, 1000);
            } catch (error) {
                console.error('Search error:', error);
                songList.innerHTML = `
                    <div class="error-state">
                        <div class="error-animation">
                            <div class="error-face">
                                <div class="error-eyes">
                                    <div class="error-eye"></div>
                                    <div class="error-eye"></div>
                                </div>
                                <div class="error-mouth"></div>
                            </div>
                        </div>
                        <p>Search failed. Please try again.</p>
                    </div>
                `;
                
                // Show error animation
                searchInput.classList.add('animate__animated', 'animate__shakeX');
                setTimeout(() => {
                    searchInput.classList.remove('animate__animated', 'animate__shakeX');
                }, 1000);
            }
        }
        
        // Set up event listeners
        function setupEventListeners() {
            searchBtn.addEventListener('click', () => searchSongs(searchInput.value));
            
            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') searchSongs(searchInput.value);
            });
            
            playBtn.addEventListener('click', togglePlay);
            prevBtn.addEventListener('click', playPrevSong);
            nextBtn.addEventListener('click', playNextSong);
            rewindBtn.addEventListener('click', rewind);
            forwardBtn.addEventListener('click', forward);
            
            volumeBtn.addEventListener('click', toggleMute);
            volumeSlider.addEventListener('input', setVolume);
            
            progressBarContainer.addEventListener('click', seekTo);
            
            filterButtons.forEach(button => {
                button.addEventListener('click', function() {
                    filterButtons.forEach(btn => btn.classList.remove('active'));
                    this.classList.add('active');
                    currentFilter = this.dataset.filter;
                    applyFilter();
                    
                    // Animate filter button
                    this.classList.add('animate__animated', 'animate__bounce');
                    setTimeout(() => {
                        this.classList.remove('animate__animated', 'animate__bounce');
                    }, 1000);
                });
            });

            queueIndicator.addEventListener('click', () => {
                showNotification(`Songs in queue: ${songQueue.length}\n\n${songQueue.map(song => `• ${song.title}`).join('\n')}`);
                
                // Animate queue indicator
                queueIndicator.classList.add('animate__animated', 'animate__tada');
                setTimeout(() => {
                    queueIndicator.classList.remove('animate__animated', 'animate__tada');
                }, 1000);
            });

            // Mobile controls
            mobilePlayBtn.addEventListener('click', togglePlay);
            mobilePrevBtn.addEventListener('click', playPrevSong);
            mobileNextBtn.addEventListener('click', playNextSong);

            // Mini player controls
            miniPlayerPlayBtn.addEventListener('click', togglePlay);
            miniPlayerPrevBtn.addEventListener('click', playPrevSong);
            miniPlayerNextBtn.addEventListener('click', playNextSong);
            
            // Handle touch events for progress bar
            progressBarContainer.addEventListener('touchstart', handleTouchProgress);
            progressBarContainer.addEventListener('touchmove', handleTouchProgress);
            
            // Prevent zooming on double-tap
            document.addEventListener('dblclick', (e) => {
                e.preventDefault();
            }, { passive: false });
            
            // Handle scroll for mini player visibility
            window.addEventListener('scroll', updateMiniPlayerVisibility);
        }
        
        // Handle touch events for progress bar
        function handleTouchProgress(e) {
            e.preventDefault();
            const touch = e.touches[0] || e.changedTouches[0];
            const rect = progressBarContainer.getBoundingClientRect();
            const percent = (touch.clientX - rect.left) / rect.width;
            const duration = player.getDuration();
            player.seekTo(duration * percent, true);
        }

        // Set up keyboard controls
        function setupKeyboardControls() {
            document.addEventListener('keydown', (e) => {
                if (document.activeElement === searchInput) return;

                switch(e.key) {
                    case ' ':
                        e.preventDefault();
                        togglePlay();
                        break;
                    case 'ArrowRight':
                        e.preventDefault();
                        forward();
                        break;
                    case 'ArrowLeft':
                        e.preventDefault();
                        rewind();
                        break;
                    case 'ArrowUp':
                        e.preventDefault();
                        volumeSlider.value = Math.min(100, parseInt(volumeSlider.value) + 10);
                        setVolume();
                        break;
                    case 'ArrowDown':
                        e.preventDefault();
                        volumeSlider.value = Math.max(0, parseInt(volumeSlider.value) - 10);
                        setVolume();
                        break;
                    case 'n':
                        e.preventDefault();
                        playNextSong();
                        break;
                    case 'p':
                        e.preventDefault();
                        playPrevSong();
                        break;
                    case 'l':
                        e.preventDefault();
                        lyricsContainer.style.display = lyricsContainer.style.display === 'none' ? 'block' : 'none';
                        break;
                    case 'm':
                        e.preventDefault();
                        toggleMute();
                        break;
                }
            });
        }
        
        // Initialize the app
        document.addEventListener('DOMContentLoaded', init);

          // Menu functionality
  (function() {
    const menuBtn = document.getElementById('nexusMenuBtn');
    const menuOverlay = document.getElementById('nexusMenuOverlay');
    
    // Toggle menu
    menuBtn.addEventListener('click', () => {
      menuBtn.classList.toggle('active');
      menuOverlay.classList.toggle('active');
      
      // Pulsing animation when opening
      if (menuBtn.classList.contains('active')) {
        menuBtn.classList.add('animate__animated', 'animate__pulse');
        setTimeout(() => {
          menuBtn.classList.remove('animate__animated', 'animate__pulse');
        }, 1000);
      }
    });
    
    // Close menu when clicking outside
    menuOverlay.addEventListener('click', (e) => {
      if (e.target === menuOverlay) {
        menuBtn.classList.remove('active');
        menuOverlay.classList.remove('active');
      }
    });
    
    // Close menu when pressing ESC
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && menuOverlay.classList.contains('active')) {
        menuBtn.classList.remove('active');
        menuOverlay.classList.remove('active');
      }
    });
  })();
    </script>
</body>
